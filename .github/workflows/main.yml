name: Build IPA Linux Fast
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create App Structure
        run: |
          mkdir -p Payload/MetaAI.app
          cp index.html Payload/MetaAI.app/index.html
          cp Info.plist Payload/MetaAI.app/Info.plist

      - name: Pack to IPA
        run: |
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-Pure-IPA
          path: MetaAI.ipa
