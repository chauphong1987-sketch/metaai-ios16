name: Build Real IPA Linux Instant
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          
          # Tải công cụ ldid bản gốc ổn định dành cho Linux x86_64
          sudo curl -L -o /usr/local/bin/ldid https://github.com/h600x/ldid-ubuntu/releases/download/v2.1.5/ldid
          sudo chmod +x /usr/local/bin/ldid

      - name: Fetch Clean WebKit Template
        run: |
          # Tạo cấu trúc thư mục Payload tiêu chuẩn của iOS
          mkdir -p Payload/MetaAI.app
          
          # Tải file thực thi gốc (Pre-compiled Mach-O) đã được tối ưu hóa cho iOS 16 bọc Web độc lập
          curl -L -o Payload/MetaAI.app/MetaAI https://raw.githubusercontent.com/h600x/WebKit-Dump/main/Binary/BaseWrapper
          chmod +x Payload/MetaAI.app/MetaAI

      - name: Inject Configuration and Fake PC UserAgent
        run: |
          # Copy file giao diện index.html của bạn vào app
          cp index.html Payload/MetaAI.app/index.html
          
          # Tạo file Info.plist chuẩn định dạng cấu trúc hệ thống Apple
          cat <<EOF > Payload/MetaAI.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.xml">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Meta AI</string>
              <key>CFBundleExecutable</key>
              <string>MetaAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.chauhpngphong.metaai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MetaAI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Sign App for TrollStore Compatibility
        run: |
          # Tiến hành gán mã ký Ad-hoc (Pseudo-sign) bằng ldid để bẻ gãy lỗi Install Error 175
          /usr/local/bin/ldid -S Payload/MetaAI.app/MetaAI

      - name: Pack to Standard IPA
        run: |
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-iOS16-Instant-IPA
          path: MetaAI.ipa
