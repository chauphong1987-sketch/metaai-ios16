name: Build Real IPA iOS 16
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ldid (Signing Tool for iOS)
        run: |
          # Tải và cài đặt công cụ ký mã ldid trực tiếp trên Linux
          sudo curl -L -o /usr/local/bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64
          sudo chmod +x /usr/local/bin/ldid

      - name: Download iOS WebWrapper Template
        run: |
          mkdir -p Payload/MetaAI.app
          
          # Tạo file Info.plist tiêu chuẩn
          cat <<EOF > Payload/MetaAI.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.xml">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Meta AI</string>
              <key>CFBundleExecutable</key>
              <string>MetaAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.trollstore.metaaiweb</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MetaAI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Inject HTML and Sign Binary
        run: |
          # Sao chép file giao diện của bạn vào app
          cp index.html Payload/MetaAI.app/index.html
          
          # Tải file thực thi nền (Native Binary) hợp lệ
          curl -L -o Payload/MetaAI.app/MetaAI https://github.com/doraicloud/native-wrapper-bin/raw/main/MetaAI
          chmod +x Payload/MetaAI.app/MetaAI
          
          # Tiến hành ký mã giả lập (Pseudo-sign) bằng ldid để sửa lỗi Install Error 175 trên TrollStore
          ldid -S Payload/MetaAI.app/MetaAI

      - name: Pack to Standard IPA
        run: |
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-iOS16-Real-IPA
          path: MetaAI.ipa
