name: Build Native Real IPA iOS 16
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Objective-C Code for App Base
        run: |
          # Tự tạo file mã nguồn khởi chạy trình duyệt bằng Objective-C cực nhẹ
          cat <<EOF > main.m
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>

          @interface AppDelegate : UIResponder <UIApplicationDelegate>
          @property (strong, nonatomic) UIWindow *window;
          @end

          @implementation AppDelegate
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
              UIViewController *vc = [[UIViewController alloc] init];
              WKWebView *webView = [[WKWebView alloc] initWithFrame:vc.view.bounds];
              
              // Giả lập máy tính Windows chạy Chrome để vượt rào Meta AI
              webView.customUserAgent = @"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
              
              [webView loadRequest:[NSURLRequest requestWithURL:[NSURL URLWithString:@"https://www.meta.ai"]]];
              [vc.view addSubview:webView];
              self.window.rootViewController = vc;
              [self.window makeKeyAndVisible];
              return YES;
          }
          @end

          int main(int argc, char * argv[]) {
              @autoreleasepool {
                  return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));
              }
          }
          EOF

      - name: Compile Native iOS Binary (Mach-O)
        run: |
          mkdir -p Payload/MetaAI.app
          # Biên dịch trực tiếp file main.m thành file nhị phân MetaAI chuẩn arm64 cho iOS 16
          xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=16.0 -framework UIKit -framework Foundation -framework WebKit main.m -o Payload/MetaAI.app/MetaAI

      - name: Create App Configurations
        run: |
          # Tạo file Info.plist đi kèm cấu trúc app
          cat <<EOF > Payload/MetaAI.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.xml">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Meta AI</string>
              <key>CFBundleExecutable</key>
              <string>MetaAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.trollstore.metaaiweb</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MetaAI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UILaunchStoryboardName</key>
              <string></string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Sign Binary natively via codesign
        run: |
          # Sử dụng chính công cụ chính chủ của Apple trên Mac để ký ad-hoc sửa lỗi ldid hoàn toàn
          codesign -s - --force --preserve-metadata=identifier,entitlements,flags Payload/MetaAI.app/MetaAI

      - name: Pack to Standard IPA
        run: |
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-iOS16-Native-IPA
          path: MetaAI.ipa
