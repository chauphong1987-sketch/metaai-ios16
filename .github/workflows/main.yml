name: Build Native Real IPA iOS 16
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Objective-C Code for App Base
        run: |
          cat <<EOF > main.m
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>

          @interface AppDelegate : UIResponder <UIApplicationDelegate, WKNavigationDelegate, WKUIDelegate>
          @property (strong, nonatomic) UIWindow *window;
          @property (strong, nonatomic) WKWebView *webView;
          @end

          @implementation AppDelegate
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
              UIViewController *vc = [[UIViewController alloc] init];
              
              WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
              config.preferences.javaScriptEnabled = YES;
              config.preferences.javaScriptCanOpenWindowsAutomatically = YES;
              
              self.webView = [[WKWebView alloc] initWithFrame:vc.view.bounds configuration:config];
              self.webView.navigationDelegate = self;
              self.webView.UIDelegate = self;
              
              // Cho phép người dùng thu phóng màn hình tự do
              self.webView.allowsLinkPreview = YES;
              
              // Ép thông số User-Agent sang Desktop Chrome hoàn chỉnh
              self.webView.customUserAgent = @"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
              
              [self.webView loadRequest:[NSURLRequest requestWithURL:[NSURL URLWithString:@"https://www.meta.ai"]]];
              [vc.view addSubview:self.webView];
              self.window.rootViewController = vc;
              [self.window makeKeyAndVisible];
              return YES;
          }

          // Ép giao diện Meta AI nhận diện chiều rộng lớn ngay khi tải xong trang
          - (void)webView:(WKWebView *)webView didFinishNavigation:(WKNavigation *)navigation {
              NSString *jScript = @"var meta = document.createElement('meta'); "
                                   "meta.name = 'viewport'; "
                                   "meta.content = 'width=1280, initial-scale=0.5, maximum-scale=2.0, user-scalable=yes'; "
                                   "document.getElementsByTagName('head')[0].appendChild(meta);";
              [webView evaluateJavaScript:jScript completionHandler:nil];
          }

          - (WKWebView *)webView:(WKWebView *)webView createWebViewWithConfiguration:(WKWebViewConfiguration *)configuration forNavigationAction:(WKNavigationAction *)navigationAction windowFeatures:(WKWindowFeatures *)windowFeatures {
              if (!navigationAction.targetFrame.isMainFrame) {
                  [webView loadRequest:navigationAction.request];
              }
              return nil;
          }
          @end

          int main(int argc, char * argv[]) {
              @autoreleasepool {
                  return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));
              }
          }
          EOF

      - name: Compile Native iOS Binary (Mach-O)
        run: |
          mkdir -p Payload/MetaAI.app
          xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=16.0 -framework UIKit -framework Foundation -framework WebKit main.m -o Payload/MetaAI.app/MetaAI

      - name: Create App Configurations
        run: |
          cat <<EOF > Payload/MetaAI.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.xml">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Meta AI</string>
              <key>CFBundleExecutable</key>
              <string>MetaAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.chauhpngphong.metaai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MetaAI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Sign Binary natively via codesign
        run: |
          codesign -s - --force --preserve-metadata=identifier,entitlements,flags Payload/MetaAI.app/MetaAI

      - name: Pack to Standard IPA
        run: |
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-iOS16-Native-IPA
          path: MetaAI.ipa
