name: Build Real IPA Linux Instant
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install iOS Toolchain on Linux
        run: |
          # Cài đặt trình biên dịch Clang và công cụ ký mã ldid chuẩn trên Linux
          sudo apt-get update
          sudo apt-get install -y clang ldid zip
          
          # Tải bộ thư viện SDK iOS rút gọn để Linux có thể tự biên dịch được code iOS
          curl -L -o ios_sdk.tar.gz https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz
          tar -xf ios_sdk.tar.gz
          mv iPhoneOS16.5.sdk SDK

      - name: Create Native C App Base
        run: |
          # Tạo mã nguồn ứng dụng bọc Web chính chủ bằng Objective-C
          cat <<EOF > main.m
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>

          @interface AppDelegate : UIResponder <UIApplicationDelegate>
          @property (strong, nonatomic) UIWindow *window;
          @end

          @implementation AppDelegate
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
              UIViewController *vc = [[UIViewController alloc] init];
              WKWebView *webView = [[WKWebView alloc] initWithFrame:vc.view.bounds];
              
              // Giả lập máy tính Windows chạy Chrome để Meta AI không chặn
              webView.customUserAgent = @"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
              
              [webView loadRequest:[NSURLRequest requestWithURL:[NSURL URLWithString:@"https://www.meta.ai"]]];
              [vc.view addSubview:webView];
              self.window.rootViewController = vc;
              [self.window makeKeyAndVisible];
              return YES;
          }
          @end

          int main(int argc, char * argv[]) {
              @autoreleasepool {
                  return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));
              }
          }
          EOF

      - name: Compile & Sign App Binary on Linux
        run: |
          mkdir -p Payload/MetaAI.app
          
          # Lệnh Linux tự biên dịch ra file thực thi iOS 16 thông qua bộ SDK vừa tải
          clang -target arm64-apple-ios16.0 -isysroot ./SDK -framework UIKit -framework Foundation -framework WebKit main.m -o Payload/MetaAI.app/MetaAI
          
          # Ký mã ad-hoc chuẩn bằng ldid để TrollStore chấp nhận
          ldid -S Payload/MetaAI.app/MetaAI

      - name: Create App Configurations
        run: |
          # Tạo file Info.plist đi kèm cấu trúc app
          cat <<EOF > Payload/MetaAI.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.xml">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Meta AI</string>
              <key>CFBundleExecutable</key>
              <string>MetaAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.trollstore.metaaiweb</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MetaAI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Pack to Standard IPA
        run: |
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-iOS16-Instant-IPA
          path: MetaAI.ipa
