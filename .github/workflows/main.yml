name: Build Real IPA iOS 16
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download iOS WebWrapper Template
        run: |
          # Tạo cấu trúc thư mục tiêu chuẩn cho App iOS
          mkdir -p Payload/MetaAI.app
          
          # Tạo file định danh cấu hình ứng dụng
          cat <<EOF > Payload/MetaAI.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.xml">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Meta AI</string>
              <key>CFBundleExecutable</key>
              <string>MetaAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.trollstore.metaaiweb</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MetaAI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Inject HTML and Mock Binary
        run: |
          # Đưa file giao diện web của bạn vào lõi ứng dụng
          cp index.html Payload/MetaAI.app/index.html
          
          # Tải file thực thi nền (Native Binary WebKit) hợp lệ cho iOS
          # File này đóng vai trò kích hoạt trình duyệt gốc chạy file index.html của bạn
          curl -L -o Payload/MetaAI.app/MetaAI https://github.com/doraicloud/native-wrapper-bin/raw/main/MetaAI
          chmod +x Payload/MetaAI.app/MetaAI

      - name: Pack to Standard IPA
        run: |
          # Đóng gói chuẩn nén định dạng zip-payload của Apple
          zip -r MetaAI.ipa Payload

      - name: Upload IPA to Github
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-iOS16-Real-IPA
          path: MetaAI.ipa
